<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="logo1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="600" height="400" fill="#1A1A2E" />
  
  <!-- أشكال خلفية -->
  <circle cx="100" cy="100" r="80" fill="rgba(236,72,153,0.08)" />
  <circle cx="520" cy="320" r="100" fill="rgba(139,92,246,0.08)" />
  
  <!-- أيقونة الشعار -->
  <g transform="translate(300, 155)">
    <circle cx="0" cy="0" r="55" fill="url(#logo1)" opacity="0.9" />
    <text x="0" y="8" font-family="Arial" font-size="40" text-anchor="middle" dominant-baseline="middle">⭐</text>
  </g>
  
  <!-- اسم المشروع -->
  <text x="300" y="245" font-family="Cairo, Arial, sans-serif" font-size="24" font-weight="700" fill="white" text-anchor="middle">
    شعار علامة تجارية
  </text>
  
  <text x="300" y="275" font-family="Cairo, Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.6)" text-anchor="middle">
    Logo Design
  </text>
  
  <line x1="200" y1="295" x2="400" y2="295" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
  
  <rect x="250" y="310" width="100" height="28" rx="14" fill="rgba(236,72,153,0.2)" />
  <text x="300" y="329" font-family="Cairo, Arial, sans-serif" font-size="12" font-weight="600" fill="#EC4899" text-anchor="middle">
    الشعارات
  </text>
  
  <text x="30" y="385" font-family="Arial" font-size="11" fill="rgba(255,255,255,0.1)" text-anchor="start">
    © CyberPath Digital
  </text>
</svg>
