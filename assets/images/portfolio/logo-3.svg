<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="logo3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="logo3glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#EC4899;stop-opacity:0.18" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:0" />
    </radialGradient>
  </defs>
  <rect width="600" height="400" fill="#1A1A2E" />
  <circle cx="560" cy="40" r="160" fill="url(#logo3glow)" />
  <circle cx="40" cy="380" r="140" fill="url(#logo3glow)" />
  <g transform="translate(300, 150)">
    <circle cx="0" cy="0" r="52" fill="none" stroke="url(#logo3)" stroke-width="3" opacity="0.7" />
    <circle cx="0" cy="0" r="40" fill="url(#logo3)" opacity="0.9" />
    <text x="0" y="9" font-family="Arial" font-size="34" text-anchor="middle" dominant-baseline="middle">⚽</text>
  </g>
  <text x="300" y="240" font-family="Cairo, Arial, sans-serif" font-size="24" font-weight="700" fill="white" text-anchor="middle">شعار نادي رياضي</text>
