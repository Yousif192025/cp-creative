  <line x1="200" y1="290" x2="400" y2="290" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
  <rect x="245" y="305" width="110" height="28" rx="14" fill="rgba(255,255,255,0.12)" />
  <text x="300" y="324" font-family="Cairo, Arial, sans-serif" font-size="12" font-weight="600" fill="#EC4899" text-anchor="middle">الشعارات</text>
  <text x="30" y="385" font-family="Arial" font-size="11" fill="rgba(255,255,255,0.1)" text-anchor="start">© CyberPath Digital</text>
