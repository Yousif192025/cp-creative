<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="branding1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C3CE1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A1F9E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="branding1accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- خلفية -->
  <rect width="600" height="400" fill="url(#branding1)" />
  
  <!-- أشكال زخرفية -->
  <circle cx="500" cy="80" r="120" fill="rgba(255,255,255,0.05)" />
  <circle cx="50" cy="350" r="100" fill="rgba(255,255,255,0.05)" />
  <circle cx="300" cy="200" r="80" fill="rgba(255,255,255,0.03)" />
  
  <!-- أيقونة -->
  <g transform="translate(300, 150)">
    <rect x="-40" y="-40" width="80" height="80" rx="16" fill="url(#branding1accent)" opacity="0.9" />
    <text x="0" y="10" font-family="Arial" font-size="36" fill="white" text-anchor="middle" dominant-baseline="middle">🏢</text>
  </g>
  
  <!-- اسم المشروع -->
  <text x="300" y="240" font-family="Cairo, Arial, sans-serif" font-size="24" font-weight="700" fill="white" text-anchor="middle">
    هوية شركة تقنية
  </text>
  
  <!-- وصف -->
  <text x="300" y="270" font-family="Cairo, Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)" text-anchor="middle">
    Brand Identity Project
  </text>
  
  <!-- خط فاصل -->
  <line x1="200" y1="290" x2="400" y2="290" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
  
  <!-- التصنيف -->
  <rect x="250" y="305" width="100" height="28" rx="14" fill="rgba(255,255,255,0.15)" />
  <text x="300" y="324" font-family="Cairo, Arial, sans-serif" font-size="12" font-weight="600" fill="#8B5CF6" text-anchor="middle">
    الهوية البصرية
  </text>
  
  <!-- علامة مائية -->
  <text x="30" y="385" font-family="Arial" font-size="11" fill="rgba(255,255,255,0.15)" text-anchor="start">
    © CyberPath Digital
  </text>
</svg>

