<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="social1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="600" height="400" fill="#0A0A0F" />
  
  <!-- أيقونات التواصل -->
  <g transform="translate(300, 140)">
    <circle cx="-60" cy="-30" r="30" fill="rgba(255,255,255,0.05)" />
    <text x="-60" y="-20" font-family="Arial" font-size="22" text-anchor="middle">📱</text>
    
    <circle cx="60" cy="-30" r="30" fill="rgba(255,255,255,0.05)" />
    <text x="60" y="-20" font-family="Arial" font-size="22" text-anchor="middle">💬</text>
    
    <circle cx="0" cy="40" r="35" fill="url(#social1)" opacity="0.9" />
    <text x="0" y="50" font-family="Arial" font-size="28" text-anchor="middle" dominant-baseline="middle">📸</text>
  </g>
  
  <text x="300" y="240" font-family="Cairo, Arial, sans-serif" font-size="24" font-weight="700" fill="white" text-anchor="middle">
    تصميم وسائل التواصل
  </text>
  
  <text x="300" y="270" font-family="Cairo, Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.6)" text-anchor="middle">
    Social Media Design
  </text>
  
  <line x1="180" y1="290" x2="420" y2="290" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
  
  <rect x="230" y="305" width="140" height="28" rx="14" fill="rgba(16,185,129,0.2)" />
  <text x="300" y="324" font-family="Cairo, Arial, sans-serif" font-size="12" font-weight="600" fill="#10B981" text-anchor="middle">
    وسائل التواصل
  </text>
  
  <text x="30" y="385" font-family="Arial" font-size="11" fill="rgba(255,255,255,0.1)" text-anchor="start">
    © CyberPath Digital
  </text>
</svg>
